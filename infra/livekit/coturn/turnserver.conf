# ─────────────────────────────────────────────────────────────────────────────
# Coturn — TURN/STUN relay pour clients derrière NAT strict.
#
# Remplacer :
#   • PUBLIC_IP : IP publique du VPS
#   • TURN_REALM : domaine principal (ex. gametrend.app)
#   • TURN_STATIC_AUTH_SECRET : 32+ caractères aléatoires (utilisé pour
#     générer les credentials éphémères côté LiveKit / clients)
# ─────────────────────────────────────────────────────────────────────────────

listening-port=3478
tls-listening-port=5349

listening-ip=0.0.0.0
external-ip=PUBLIC_IP

min-port=49152
max-port=49999

fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=TURN_STATIC_AUTH_SECRET
realm=TURN_REALM

no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

# Sécurité : pas de relais vers les IP privées
no-loopback-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

cipher-list="ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20:ECDH+AESGCM:DH+AESGCM:ECDH+AES:DH+AES:RSA+AESGCM:RSA+AES:!aNULL:!eNULL:!LOW:!RC4:!MD5:!EXP:!PSK:!SRP:!DSS"
